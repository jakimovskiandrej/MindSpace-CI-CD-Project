apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mindspace-postgres
  namespace: mindspace
spec:
  serviceName: mindspace-postgres
  replicas: 1
  selector:
    matchLabels:
      app: mindspace-postgres
  template:
    metadata:
      labels:
        app: mindspace-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: mindspace
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: mindspace-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mindspace-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi